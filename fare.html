<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fare Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-glass: rgba(10, 10, 10, 0.9);
            --border-glass: rgba(255, 255, 255, 0.1);
            --nyc-yellow: #ffc107;
            --radius-super: 40px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://i.pinimg.com/1200x/cc/6e/c4/cc6ec493ed3b8b0f8aa94413fb2d03b0.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 100vh; 
            color: white;
        }

        .navbar {
            background: var(--dark-glass) !important;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            margin: 20px auto;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            width: 90%;
            max-width: 1200px;
        }

        .navbar-brand { font-weight: 800; color: white !important; }
        .nav-link.active { color: var(--nyc-yellow) !important; font-weight: 700; }

        .main-card {
            background: var(--dark-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-super);
            padding: 50px;
            max-width: 550px;
            width: 90%;
            margin: 60px auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .station-select, .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px;
            padding: 15px;
        }

        .station-select:focus, .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: var(--nyc-yellow);
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.2);
        }

        .btn-ride, .btn-submit {
            background: var(--nyc-yellow);
            color: black;
            font-weight: 800;
            border-radius: 25px;
            padding: 18px;
            border: none;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }

        .btn-ride:hover, .btn-submit:hover {
            transform: scale(1.05);
            background: white;
        }

        .result-pill {
            background: rgba(255, 193, 7, 0.05);
            border-radius: 30px;
            padding: 25px;
            margin-top: 35px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            text-align: center;
            display: none;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fare-price {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            color: var(--nyc-yellow);
        }

        .modal-content {
            background: #0a0a0a;
            border-radius: var(--radius-super);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 30px;
        }

        #success-message {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--nyc-yellow);
            margin-bottom: 15px;
        }

        .form-check-input:checked {
            background-color: var(--nyc-yellow);
            border-color: var(--nyc-yellow);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="Home.html">🏍️ eCABI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="fare.html">Fare Matrix</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
                </ul>
                <button class="btn btn-light rounded-pill px-4 ms-lg-4 fw-bold" type="button" data-bs-toggle="modal" data-bs-target="#createAccountModal">Create Account</button>
            </div>
        </div>
    </nav>

    <div class="main-card">
        <h1 class="fw-800 mb-2">Ride Calculator</h1>
        <p class="text-secondary mb-5 fw-600">MRT LINE 3 • METRO MANILA</p>

        <div class="mb-4">
            <label class="form-label small fw-800 text-uppercase opacity-50 mb-2">Pickup Point</label>
            <select class="form-select station-select" id="pickup">
                <option value="0">North Avenue</option>
                <option value="2.1">Quezon Avenue</option>
                <option value="3.1">Kamuning</option>
                <option value="5.0">Araneta-Cubao</option>
                <option value="7.4">Santolan</option>
                <option value="9.7">Ortigas</option>
                <option value="10.5">Shaw Blvd</option>
                <option value="11.6">Boni</option>
                <option value="12.9">Guadalupe</option>
                <option value="14.8">Buendia</option>
                <option value="15.8">Ayala</option>
                <option value="17.4">Magallanes</option>
                <option value="18.9">Taft Avenue</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-800 text-uppercase opacity-50 mb-2">Drop-off Point</label>
            <select class="form-select station-select" id="dropoff">
                <option value="18.9">Taft Avenue</option>
                <option value="15.8">Ayala</option>
                <option value="14.8">Buendia</option>
                <option value="5.0">Araneta-Cubao</option>
                <option value="0">North Avenue</option>
            </select>
        </div>

        <div class="form-check form-switch mb-5">
            <input class="form-check-input" type="checkbox" id="discount">
            <label class="form-check-label small fw-600 text-secondary" for="discount">Student / Senior / PWD Discount</label>
        </div>

        <button class="btn btn-ride" onclick="calculateFare()">Compute Fare</button>

        <div id="resultArea" class="result-pill">
            <p class="small text-uppercase fw-800 opacity-50 mb-1">Total Fare Estimate</p>
            <h3 class="fare-price" id="totalDisplay">₱0.00</h3>
            <span class="small text-secondary fw-600" id="distDisplay">0 km distance</span>
        </div>
    </div>

    <div class="modal fade" id="createAccountModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div id="registration-form">
                    <h2 class="fw-800 mb-4">Create Account</h2>
                    <input type="text" class="form-control mb-3" placeholder="Username">
                    <input type="email" class="form-control mb-3" placeholder="Email Address">
                    <input type="password" class="form-control mb-4" placeholder="Password">
                    <button class="btn btn-submit" onclick="showConfirmation()">Sign Up</button>
                </div>

                <div id="success-message">
                    <div class="success-icon">🚕</div>
                    <h2 class="fw-800 mb-2" style="color: var(--nyc-yellow)">Success!</h2>
                    <p class="text-secondary mb-4">Account has been created.</p>
                    <button class="btn btn-outline-light rounded-pill px-5" data-bs-dismiss="modal">Start Riding</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateFare() {
            const baseFare = 50; 
            const perKM = 15;
            const baseKM = 2;

            let start = parseFloat(document.getElementById('pickup').value);
            let end = parseFloat(document.getElementById('dropoff').value);
            let distance = Math.abs(end - start);
            
            if (distance === 0) return alert("Select a valid destination.");

            let total = baseFare;
            if (distance > baseKM) {
                total += (distance - baseKM) * perKM;
            }

            if (document.getElementById('discount').checked) {
                total *= 0.8;
            }

            document.getElementById('resultArea').style.display = "block";
            document.getElementById('totalDisplay').innerText = "₱" + total.toFixed(2);
            document.getElementById('distDisplay').innerText = distance.toFixed(2) + " km route";
        }

        function showConfirmation() {
            document.getElementById('registration-form').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
